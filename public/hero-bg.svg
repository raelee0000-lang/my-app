<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#2997ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2997ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="65%" r="40%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <circle cx="320" cy="180" r="2" fill="#2997ff" fill-opacity="0.6"/>
  <circle cx="1580" cy="720" r="2" fill="#2997ff" fill-opacity="0.4"/>
  <circle cx="960" cy="400" r="1.5" fill="#ffffff" fill-opacity="0.3"/>
  <line x1="320" y1="180" x2="520" y2="280" stroke="#2997ff" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="520" y1="280" x2="720" y2="220" stroke="#2997ff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="1200" y1="600" x2="1580" y2="720" stroke="#6366f1" stroke-opacity="0.12" stroke-width="1"/>
</svg>
